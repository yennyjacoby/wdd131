<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorite Book of Mormon Chapters</title>
  <link rel="stylesheet" href="bom.css">
</head>
<body>
  <header>
    <h1>Favorite Book of Mormon Chapters</h1>
  </header>

  <main>
    <section>
      <label for="favchap">Enter a Favorite Chapter:</label>
      <input type="text" id="favchap" placeholder="e.g. Alma 32" />
      <button type="button">Add Chapter</button>
    </section>

    <section>
      <h2>My Favorite Chapters</h2>
      <ul id="list"></ul>
    </section>
  </main>

  <script src="bom.js"></script>
</body>
</html>
